name: CI — Lint, type-check, test, build

on:
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint + Type check + Build
  # ─────────────────────────────────────────
  lint-build:
    name: Lint + Type check + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "yarn"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/cache
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn tsc --noEmit

      - name: Build
        run: yarn build
        env:
          NEXTAUTH_SECRET: ci-placeholder
          JWT_SECRET: ci-placeholder
          MONGODB_URI: mongodb://localhost:27017/test
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

  # ─────────────────────────────────────────
  # JOB 2 — Unit + Integration Tests
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test --ci --coverage
        env:
          NEXTAUTH_SECRET: ci-placeholder
          JWT_SECRET: ci-placeholder
          MONGODB_URI: mongodb://localhost:27017/test
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3 — Dependency Security Audit
  # ─────────────────────────────────────────
  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Audit dependencies
        run: yarn audit --audit-level=high

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  # ─────────────────────────────────────────
  # JOB 4 — Docker Image Vulnerability Scan
  # ─────────────────────────────────────────
  trivy-scan:
    name: Trivy Docker Scan
    runs-on: ubuntu-latest
    needs: lint-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t easyshop-scan .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: easyshop-scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 7