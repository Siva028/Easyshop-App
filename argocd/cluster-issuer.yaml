# Apply after cert-manager is running:
# kubectl apply -f argocd/cluster-issuer.yaml

# ── Staging issuer — use this first ──────────────────────────────
# Staging has higher rate limits — safe for testing
# Certs will show as "untrusted" in browser but that's expected
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: siva.subramanian3@icloud.com     # ← replace with your email
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ── Production issuer — use once staging works ───────────────────
# Only switch to this after staging certs are issuing correctly
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: siva.subramanian3@icloud.com     # ← replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx